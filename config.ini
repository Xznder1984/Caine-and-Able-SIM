# C&A OS Simulator Configuration
# This file contains settings for the simulator appearance and behavior

[DISPLAY]
# Boot immediately or show BIOS screen first
# Options: true, false
INSTANT_BOOT=false

# Fullscreen mode (recommended: true)
FULLSCREEN=true

# Hide Windows taskbar
HIDE_TASKBAR=true

# Text color (hex code without #)
TEXT_COLOR=00FF00

# Background color (hex code)
BACKGROUND_COLOR=000000

# CRT scanline intensity (0-100)
SCANLINE_INTENSITY=30

# Glitch frequency (0-100, 0=never, 100=always)
GLITCH_FREQUENCY=5

[AUDIO]
# Enable sound effects
ENABLE_AUDIO=true

# Volume level (0-100)
VOLUME=50

# Play boot sound
BOOT_SOUND=true

# Play error beeps
ERROR_SOUNDS=true

[SYSTEM]
# User name displayed in system info
USER_NAME=KINGER

# System version
SYSTEM_VERSION=1.0

# Enable lore files in filesystem
LORE_FILES=true

# Auto-close delay after deletion (seconds)
AUTO_CLOSE_DELAY=5

[INPUT]
# Exit key combination
EXIT_KEY=Ctrl+Shift+Q

# Enable command history
COMMAND_HISTORY=true

# Auto-complete commands
AUTO_COMPLETE=true

# Case-sensitive commands
CASE_SENSITIVE=false

[DELETION]
# Deletion confirmation required
REQUIRE_CONFIRMATION=true

# Glitch intensity during deletion (0-100)
DELETION_GLITCH_INTENSITY=90

# Number of deletion sequence steps
DELETION_STEPS=7

# Auto-close after deletion
AUTO_CLOSE_AFTER_DELETE=true
